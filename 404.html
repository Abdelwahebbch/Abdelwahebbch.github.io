<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page introuvable</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b,#0f766e);
      overflow:hidden;
      color:white;
    }

    body::before,
    body::after{
      content:"";
      position:absolute;
      width:350px;
      height:350px;
      border-radius:50%;
      filter:blur(80px);
      opacity:.4;
    }

    body::before{
      background:#14b8a6;
      top:-120px;
      left:-120px;
    }

    body::after{
      background:#3b82f6;
      bottom:-120px;
      right:-120px;
    }

    .container{
      position:relative;
      z-index:2;
      text-align:center;
      padding:50px;
      width:90%;
      max-width:700px;

      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.15);
      backdrop-filter:blur(18px);
      border-radius:25px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
    }

    h1{
      font-size:9rem;
      font-weight:700;
      line-height:1;
      color:#14b8a6;
      text-shadow:0 0 25px rgba(20,184,166,.45);
    }

    h2{
      margin-top:15px;
      font-size:2rem;
      font-weight:600;
    }

    p{
      margin:20px auto 35px;
      max-width:500px;
      color:#d1d5db;
      line-height:1.7;
      font-size:1.05rem;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:15px;
      flex-wrap:wrap;
    }

    a{
      text-decoration:none;
      padding:14px 30px;
      border-radius:50px;
      transition:.3s;
      font-weight:600;
    }

    .home{
      background:#14b8a6;
      color:white;
    }

    .home:hover{
      transform:translateY(-3px);
      box-shadow:0 10px 25px rgba(20,184,166,.4);
    }

    .back{
      border:2px solid rgba(255,255,255,.2);
      color:white;
    }

    .back:hover{
      background:rgba(255,255,255,.08);
    }

    .code{
      position:absolute;
      font-size:18rem;
      font-weight:700;
      color:rgba(255,255,255,.03);
      user-select:none;
      pointer-events:none;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
    }

    @media(max-width:768px){

      h1{
        font-size:6rem;
      }

      h2{
        font-size:1.5rem;
      }

      .code{
        font-size:10rem;
      }

    }
  </style>
</head>

<body>

<div class="code">404</div>

<div class="container">

    <h1>404</h1>

    <h2>Oups ! Cette page est introuvable.</h2>

    <p>
        La page que vous recherchez n'existe pas, a été déplacée
        ou son adresse est incorrecte.
    </p>

    <div class="buttons">
        <a href="/" class="home">🏠 Retour à l'accueil</a>

        <a href="javascript:history.back()" class="back">
            ← Page précédente
        </a>
    </div>

</div>

</body>
</html>
